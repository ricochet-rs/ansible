- name: Set package filename (Debian)
  ansible.builtin.set_fact:
    _ricochet_pkg_filename: >-
      ricochet-server_{{ ricochet_version }}-1_{{
      (ansible_facts['dpkg_arch'] | default(ansible_facts['architecture']))
      | regex_replace('^x86_64$', 'amd64')
      | regex_replace('^aarch64$', 'arm64')
      }}.deb
  when: ansible_facts['os_family'] == "Debian"

- name: Set package filename (RedHat)
  ansible.builtin.set_fact:
    _ricochet_pkg_filename: "ricochet-server-{{ ricochet_version }}-1.el{{ ansible_facts['distribution_major_version'] }}.{{ ansible_facts['architecture'] }}.rpm"
  when: ansible_facts['os_family'] == "RedHat"

- name: Download ricochet-server package
  ansible.builtin.get_url:
    url: '{{ ricochet_package_url_base }}/{{ ricochet_version }}/{{ _ricochet_pkg_filename }}'
    dest: '/tmp/{{ _ricochet_pkg_filename }}'
    mode: '0644'
  # Always download so the install task has a real RPM/DEB to inspect in --check mode.
  check_mode: false
  when: ricochet_deploy

- name: Install ricochet-server package (Debian)
  ansible.builtin.apt:
    deb: '/tmp/{{ _ricochet_pkg_filename }}'
    state: present
  # Skip in --check: apt/dnf cannot evaluate a local package in check mode without
  # actually performing the install, which would error out.
  when: ricochet_deploy and ansible_facts['os_family'] == "Debian" and not ansible_check_mode

- name: Install ricochet-server package (RedHat)
  ansible.builtin.dnf:
    name: '/tmp/{{ _ricochet_pkg_filename }}'
    state: present
    disable_gpg_check: true
  when: ricochet_deploy and ansible_facts['os_family'] == "RedHat" and not ansible_check_mode

- name: Ensure ricochet data directory exists
  ansible.builtin.file:
    path: /var/lib/ricochet
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Template ricochet-config.toml
  ansible.builtin.template:
    src: ricochet-config.toml.j2
    dest: /var/lib/ricochet/ricochet-config.toml
    owner: root
    group: root
    mode: '0644'
  vars:
    _ricochet_config: '{{ ricochet_config }}'
  notify: Restart ricochet-server

- name: Ensure ricochet systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/ricochet-server.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy ricochet systemd override
  ansible.builtin.copy:
    dest: /etc/systemd/system/ricochet-server.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Service]
      {% if ricochet_systemd_disable_delegate %}
      Delegate=no
      {% endif %}
      TimeoutStopSec={{ ricochet_systemd_timeout_stop_sec }}s
      {% if ricochet_systemd_cleanup_stale_processes %}
      ExecStopPost=/bin/bash -lc '/usr/bin/pkill -9 -f "{{ ricochet_systemd_cleanup_match }}" || true'
      {% endif %}
  notify: Restart ricochet-server

- name: Enable and start ricochet-server
  ansible.builtin.systemd_service:
    name: ricochet-server.service
    state: started
    enabled: true
    daemon_reload: true
  # Skip in --check: the unit file does not exist because the install task above is skipped.
  when: ricochet_deploy and not ansible_check_mode

- name: Clean up downloaded package
  ansible.builtin.file:
    path: '/tmp/{{ _ricochet_pkg_filename }}'
    state: absent
  # Mirror the download above so --check leaves no artifacts behind.
  check_mode: false
  when: ricochet_deploy
