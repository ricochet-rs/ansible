when:
  - event: tag

clone:
  git:
    image: codefloe.com/crow-plugins/clone:1.0.3
    settings:
      tags: true

labels:
  backend: docker

depends_on:
  - lint

steps:
  release-collection:
    environment:
      GALAXY_TOKEN:
        from_secret: GALAXY_TOKEN
    image: reg.devxy.io/devxy/alpine-ansible:edge
    commands:
      - apk add py3-distlib
      # replace version in galaxy.yml
      - "sed -i 's/version: .*/version: ${CI_COMMIT_TAG#v}/' galaxy.yml"
      - ansible-galaxy collection build
      - export tarball=$(ls | grep ricochet-)
      - ansible-galaxy collection install $tarball
      - ansible-galaxy collection publish --token $GALAXY_TOKEN $tarball

  changelog:
    image: reg.ricochet.rs/docker.io/thegeeklab/git-sv:2.0.11
    commands:
      - apk add --no-cache -q sed
      - git sv current-version
      - git sv release-notes -t ${CI_COMMIT_TAG} -o CHANGELOG.md
      - sed -i '1,2d' CHANGELOG.md # remove version
      - cat CHANGELOG.md
    when:
      event: tag

  'Create release':
    image: reg.ricochet.rs/docker.io/woodpeckerci/plugin-release:0.3.0
    settings:
      note: CHANGELOG.md
      api_key:
        from_secret: ricochet_issue_token
      files:
        - dist/*.tar.gz
      title: ${CI_COMMIT_TAG}
    when:
      event: tag

  'Push changes to repo':
    image: reg.ricochet.rs/docker.io/appleboy/drone-git-push:1.2.3
    settings:
      remote: ${CI_REPO_CLONE_SSH_URL}
      branch: main
      commit: true
      ssh_key:
        from_secret: ricochet-bot-deploy-key-ansible
      commit_message: '[skip ci] Update galaxy.yml after release'
      author_name: ricochet-bot
      author_email: droid@ricochet.rs
    when:
      - event: tag
